<!DOCTYPE html>
<html lang="id">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Verifikasi Dokumen LHK</title>

  <style>
    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      padding:20px;
      font-family:Arial, Helvetica, sans-serif;
      background:#f3f4f6;
    }

    .card{
      max-width:600px;
      margin:auto;
      background:#fff;
      border-radius:16px;
      padding:24px;
      box-shadow:0 10px 30px rgba(0,0,0,.08);
    }

    .header{
      text-align:center;
      margin-bottom:20px;
    }

    .logo{
      width:70px;
      margin-bottom:10px;
    }

    h2{
      margin:0;
      color:#1f2937;
    }

    .subtitle{
      color:#6b7280;
      font-size:14px;
      margin-top:4px;
    }

    .status{
      text-align:center;
      font-weight:bold;
      padding:12px;
      border-radius:10px;
      margin-bottom:20px;
      font-size:15px;
    }

    .valid{
      background:#dcfce7;
      color:#166534;
      border:1px solid #bbf7d0;
    }

    .invalid{
      background:#fee2e2;
      color:#991b1b;
      border:1px solid #fecaca;
    }

    .row{
      padding:12px 0;
      border-bottom:1px solid #e5e7eb;
    }

    .row:last-child{
      border-bottom:none;
    }

    .label{
      font-size:12px;
      color:#6b7280;
      margin-bottom:4px;
    }

    .value{
      font-weight:600;
      color:#111827;
      word-break:break-word;
    }

    .btn-download{
      display:inline-block;
      width:100%;
      text-align:center;
      text-decoration:none;
      background:#2563eb;
      color:#fff;
      padding:14px;
      border-radius:10px;
      font-weight:bold;
      margin-top:20px;
      transition:.2s;
    }

    .btn-download:hover{
      background:#1d4ed8;
    }

    .footer{
      margin-top:20px;
      text-align:center;
      font-size:12px;
      color:#9ca3af;
    }

    .loading{
      text-align:center;
      color:#6b7280;
      padding:20px;
    }

  </style>
</head>

<body>

<div class="card">

  <div class="header">
    <h2>Verifikasi Dokumen LHK</h2>
    <div class="subtitle">
      Sistem Elektronik Laporan Kinerja Harian (E-LKH)
    </div>
  </div>

  <div id="status" class="loading">
    Memverifikasi dokumen...
  </div>

  <div id="content"></div>

  <div class="footer">
    Komisi Pemilihan Umum Kabupaten Siak
  </div>

</div>

<script>

const cetakId =
<?!= JSON.stringify(typeof cetakId !== 'undefined' ? cetakId : null) ?>;

if (!cetakId){

  const status = document.getElementById('status');

  status.textContent =
    '❌ ID Cetak tidak ditemukan';

  status.className =
    'status invalid';

}else{

  google.script.run
    .withSuccessHandler(renderResult)
    .withFailureHandler(function(error){

      const status =
        document.getElementById('status');

      status.textContent =
        '❌ Gagal memverifikasi dokumen';

      status.className =
        'status invalid';

      console.error(error);

    })
    .verifyCetakLHK(cetakId);

}

function renderResult(res){

  const status =
    document.getElementById('status');

  const content =
    document.getElementById('content');

  if (!res || !res.valid){

    status.textContent =
      '❌ DOKUMEN TIDAK VALID';

    status.className =
      'status invalid';

    content.innerHTML = `
      <div style="text-align:center;padding:10px">
        <p>${res?.message || 'Data tidak ditemukan'}</p>
      </div>
    `;

    return;
  }

  status.textContent =
    '✅ DOKUMEN VALID';

  status.className =
    'status valid';

  let html = `
    <div class="row">
      <div class="label">ID CETAK</div>
      <div class="value">${res.cetakId || '-'}</div>
    </div>

    <div class="row">
      <div class="label">NAMA PEGAWAI</div>
      <div class="value">${res.nama || '-'}</div>
    </div>

    <div class="row">
      <div class="label">NIP</div>
      <div class="value">${res.nip || '-'}</div>
    </div>

    <div class="row">
      <div class="label">PERIODE LHK</div>
      <div class="value">${res.periode || '-'}</div>
    </div>

    <div class="row">
      <div class="label">TOTAL HARI KERJA</div>
      <div class="value">${res.totalHari || 0} Hari</div>
    </div>

    <div class="row">
      <div class="label">TOTAL AGENDA</div>
      <div class="value">${res.totalAgenda || 0} Agenda</div>
    </div>
  `;

  if(res.fileUrl){

    html += `
      <a
        href="${res.fileUrl}"
        target="_blank"
        class="btn-download">
        📄 Download Dokumen LHK
      </a>
    `;

  }

  content.innerHTML = html;

}

</script>

</body>
</html>
