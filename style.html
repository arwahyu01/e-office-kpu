<style>
/* ======================================================
   GLOBAL RESET & BASE
====================================================== */
:root {
  --primary: #b30000;
  --primary-soft: #fdeaea;
  --bg-main: #f8fafc;
  --bg-card: #ffffff;
  --text-main: #0f172a;
  --text-muted: #64748b;
  --border-soft: #e5e7eb;
  --shadow-soft: 0 8px 24px rgba(15, 23, 42, 0.06);
  --shadow-hover: 0 12px 32px rgba(15, 23, 42, 0.08);
  --radius-lg: 18px;
  --radius-md: 14px;
  --radius-sm: 10px;
}

* {
  box-sizing: border-box;
}

body {
  font-family: 'Plus Jakarta Sans', sans-serif;
  background: var(--bg-main);
  color: var(--text-main);
  line-height: 1.6;
}

/* ======================================================
   LOADING
====================================================== */
#loading {
  position: fixed;
  inset: 0;
  background: #ffffffad;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 99999;
}

.loading-spinner {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  border: 4px solid #e5e7eb;
  border-top-color: var(--primary);
  animation: spin 0.8s linear infinite;
}

.loading-text {
  margin-top: 14px;
  font-weight: 600;
  color: var(--text-muted);
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* ======================================================
   BUTTON SYSTEM (UNIFIED)
====================================================== */

.btn-primary,
.btn-secondary,
.btn-preview {
  padding: 10px 18px;
  border-radius: 12px;
  font-weight: 700;
  font-size: 14px;
  cursor: pointer;
  transition: all 0.2s ease;
  border: none;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}

/* ================= PRIMARY ================= */
.btn-primary {
  background: linear-gradient(135deg, #dc2626, #b91c1c);
  color: #ffffff;
  box-shadow: 0 6px 18px rgba(220, 38, 38, 0.25);
}

.btn-primary:hover {
  background: linear-gradient(135deg, #b91c1c, #991b1b);
  transform: translateY(-1px);
  box-shadow: 0 10px 28px rgba(220, 38, 38, 0.35);
}

.btn-primary:active {
  transform: translateY(0);
}

/* ================= PREVIEW ================= */
.btn-preview {
  background: linear-gradient(135deg, #3b82f6, #2563eb);
  color: #ffffff;
  box-shadow: 0 6px 18px rgba(37, 99, 235, 0.25);
}

.btn-preview:hover {
  background: linear-gradient(135deg, #2563eb, #1d4ed8);
  transform: translateY(-1px);
  box-shadow: 0 10px 28px rgba(37, 99, 235, 0.35);
}

.btn-preview:active {
  transform: translateY(0);
}

/* ================= SECONDARY ================= */
.btn-secondary {
  background: #f1f5f9;
  color: #334155;
  border: 1px solid #e2e8f0;
}

.btn-secondary:hover {
  background: #e2e8f0;
  transform: translateY(-1px);
}

.btn-secondary:active {
  transform: translateY(0);
  background: #cbd5e1;
}

/* ================= DISABLED ================= */
button:disabled {
  opacity: 0.6;
  cursor: not-allowed;
  transform: none;
  box-shadow: none;
}

button:focus {
  outline: none;
  box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.25);
}


/* ======================================================
   AUTH PAGE
====================================================== */
.auth-container {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 24px;
}

.auth-card {
  width: 100%;
  max-width: 460px;
  background: var(--bg-card);
  border-radius: var(--radius-lg);
  padding: 36px;
  box-shadow: var(--shadow-soft);
}

.form-control {
  width: 100%;
  padding: 14px 16px;
  border-radius: var(--radius-md);
  border: 1px solid var(--border-soft);
  font-size: 14px;
  background: #fff;
  transition: all 0.2s ease;
}

.form-control:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(179, 0, 0, 0.08);
}



/* ======================================================
   FORGOT PASSWORD
====================================================== */
.forgot-password {
  margin-top: 18px;
  text-align: center;
}

.forgot-password a {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  font-weight: 600;
  color: #64748b;
  text-decoration: none;
  transition: all 0.2s ease;
}

.forgot-password a i {
  font-size: 14px;
}

.forgot-password a:hover {
  color: var(--primary);
  text-decoration: underline;
}
.forgot-password a {
  opacity: 0.85;
}

.forgot-password a:hover {
  opacity: 1;
}

/* ======================================================
   SIDEBAR
====================================================== */

.sidebar {
  background: #ffffff;
  border-right: 1px solid var(--border-soft);
  box-shadow: 4px 0 24px rgba(15, 23, 42, 0.04);
}

.sidebar-header {
  padding: 24px;
  border-bottom: 1px solid var(--border-soft);
}

.logo-icon {
  background: var(--primary);
  color: #fff;
  border-radius: 14px;
  width: 44px;
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.sidebar-nav {
  padding: 16px;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 16px;
  border-radius: var(--radius-md);
  color: var(--text-muted);
  font-weight: 600;
  transition: all 0.2s ease;
  position: relative;
}

.nav-item i {
  font-size: 18px;
  position: relative;
}

.nav-item:hover {
  background: var(--primary-soft);
  color: var(--primary);
}

.nav-item.active {
  background: var(--primary);
  color: #fff;
  box-shadow: 0 6px 20px rgba(179, 0, 0, 0.3);
}

.nav-badge {
    position: absolute;
    top: 6px;
    right: 10px;

    background: #ef4444;
    color: white;

    font-size: 11px;
    font-weight: 600;

    min-width: 18px;
    height: 18px;

    padding: 0 5px;

    border-radius: 999px;

    display: flex;
    align-items: center;
    justify-content: center;

    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
}
/* ======================================================
   SIDEBAR TOGGLE MOBILE – TEGAS & BERWIBAWA
====================================================== */
.sidebar-toggle {
  display : none;
}
@media (max-width: 768px) {
  /* .sidebar-tougle {
    display : block;
  } */

  /* Toggle button */
  .sidebar-toggle,
  .menu-toggle {
    position: fixed;
    /* top: 26px;
    left: 23px; */
    top: 15px;
    left: 22px;
    width: 44px;
    height: 44px;
    border-radius: 12px;
    background: linear-gradient(135deg, #b30000, #ff4d4d);
    color: #ffffff;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1001;
    box-shadow: 0 8px 24px rgba(179, 0, 0, 0.45);
  }

  /* Icon di dalam toggle */
  .sidebar-toggle i,
  .menu-toggle i {
    font-size: 22px;
  }

  /* Hover / active feedback */
  .sidebar-toggle:active,
  .menu-toggle:active {
    transform: scale(0.96);
  }
}

/* ======================================================
   MAIN CONTENT
====================================================== */
.main-content {
  padding: 32px;
}

.hero-section {
  background: #ffffff;
  border-radius: var(--radius-lg);
  padding: 28px 32px;
  box-shadow: var(--shadow-soft);
  margin-bottom: 24px;
}

.hero-section h1 {
  font-size: 26px;
  font-weight: 800;
}

.hero-section p {
  color: var(--text-muted);
  margin-top: 6px;
}

/* ======================================================
   STATS
====================================================== */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
  margin-bottom: 24px;
}

.stat-card {
  background: #ffffff;
  border-radius: var(--radius-lg);
  padding: 22px;
  box-shadow: var(--shadow-soft);
  display: flex;
  align-items: center;
  gap: 18px;
}

.stat-icon {
  width: 48px;
  height: 48px;
  border-radius: 14px;
  background: var(--primary-soft);
  color: var(--primary);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
}

.stat-info h3 {
  font-size: 22px;
  font-weight: 800;
}

.stat-info p {
  color: var(--text-muted);
  font-size: 13px;
}

/* ======================================================
   FILTER BAR
====================================================== */
.filter-bar {
  background: #ffffff;
  padding: 18px 22px;
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-soft);
  display: flex;
  flex-wrap: wrap;
  justify-content: space-between;
  align-items: center;
  gap: 16px;
  margin-bottom: 20px;
}

.filter-select {
  padding: 12px 14px;
  border-radius: var(--radius-md);
  border: 1px solid var(--border-soft);
  font-size: 14px;
}

/* ======================================================
   TABLE
====================================================== */
.table-container {
  background: #ffffff;
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-soft);
  overflow: hidden;
}

table {
  width: 100%;
  border-collapse: collapse;
}

thead {
  background: #f9fafb;
}

th {
  padding: 16px;
  text-align: left;
  font-size: 13px;
  font-weight: 700;
  color: var(--text-muted);
  border-bottom: 1px solid var(--border-soft);
}

td {
  padding: 16px;
  border-bottom: 1px solid var(--border-soft);
  font-size: 14px;
}

tbody tr:hover {
  background: #fafafa;
}

/* ======================================================
   BADGE & ACTIONS
====================================================== */
.badge {
  background: var(--primary-soft);
  color: var(--primary);
  padding: 6px 12px;
  border-radius: 999px;
  font-weight: 700;
  font-size: 12px;
}

.action-buttons button {
  width: 36px;
  height: 36px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  transition: all 0.2s ease;
}

.btn-edit {
  background: #e0f2fe;
  color: #0284c7;
}

.btn-delete {
  background: #fee2e2;
  color: #dc2626;
}

.action-buttons button:hover {
  transform: scale(1.05);
}

/* ======================================================
   MODAL
====================================================== */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(15, 23, 42, 0.4);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  overflow-y: auto;
  padding: 20px 16px;
}

.modal-content {
  background: #ffffff;
  width: 100%;
  max-width: 520px;
  border-radius: var(--radius-lg);
  padding: 28px;
  box-shadow: var(--shadow-hover);
}

.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}

.close-btn {
  background: #f1f5f9;
  border: none;
  width: 36px;
  height: 36px;
  border-radius: 10px;
  cursor: pointer;
}

/* ======================================================
   EMPTY STATE
====================================================== */
.empty-state {
  text-align: center;
  padding: 48px 24px;
  color: var(--text-muted);
}

.empty-state i {
  font-size: 48px;
  margin-bottom: 16px;
  color: #cbd5e1;
}

html, body {
  height: 100%;
  margin: 0;
  overflow-x: hidden;
}

#dashboard {
  display: flex;
  min-height: 100vh;
  background: #f8fafc;
}

.sidebar {
  width: 260px;
  min-width: 260px;
  max-width: 260px;
  height: 100vh;
  position: fixed;
  top: 0;
  left: 0;
  background: #ffffff;
  border-right: 1px solid #e5e7eb;
  z-index: 100;
  overflow-y: auto;
}

/* MAIN CONTENT FIX */
.main-content {
  margin-left: 260px;
  width: calc(100% - 260px);
  padding: 32px;
  box-sizing: border-box;
}

/* MOBILE MODE */
@media (max-width: 768px) {
  .sidebar {
    transform: translateX(-100%);
    transition: transform 0.3s ease;
  }

  .sidebar.open {
    transform: translateX(0);
  }

  .main-content {
    margin-left: 0;
    width: 100%;
    padding: 20px;
  }
}

/* NAV ITEM WIDTH FIX */
.nav-item {
  width: 100%;
  box-sizing: border-box;
}

/* HERO & CARD ALIGNMENT */
.hero-section,
.stat-card,
.filter-bar,
.table-container {
  width: 100%;
}

.sidebar-header {
  display: block;
}

.sidebar,
.main-content {
  scroll-behavior: smooth;
}

/* ======================================================
   SIDEBAR FINAL – ELEGAN & PROFESIONAL
====================================================== */

/* Sidebar sebagai column layout */
.sidebar {
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  background: #ffffff;
}

/* Konten utama sidebar */
.sidebar-content {
  flex: 1;
  display: flex;
  flex-direction: column;
}

/* =======================
   BRAND / HEADER
======================= */
.sidebar-header {
  padding: 14px 22px 17px;
  border-bottom: 1px solid #e5e7eb;
}

.logo {
  display: flex;
  align-items: center;
  gap: 14px;
}

.logo-icon {
  width: 44px;
  height: 44px;
  border-radius: 14px;
  background: linear-gradient(135deg, #b30000, #ff4d4d);
  color: #ffffff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
}

.logo-text {
  font-size: 18px;
  font-weight: 800;
  color: #0f172a;
  line-height: 1.2;
}

.logo-text span {
  display: block;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.08em;
  color: #b30000;
  text-transform: uppercase;
}

.app-version {
  /* margin-top: 6px; */
  font-size: 11px;
  font-weight: 700;
  color: #94a3b8;
}

/* =======================
   NAVIGATION
======================= */
.sidebar-nav {
  padding: 20px 14px;
}

.nav-item {
  margin-bottom: 6px;
}

/* =======================
   FOOTER (FIXED BOTTOM)
======================= */
.sidebar-footer {
  padding: 18px 20px;
  border-top: 1px solid #e5e7eb;
  background: #f9fafb;
  margin-top: auto;
  flex-shrink: 0;
  position: sticky;
  bottom: 0;
}

/* Brand institusi */
.institution-brand {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 14px;
}

.brand-icon {
  width: 38px;
  height: 38px;
  border-radius: 10px;
  background: #fee2e2;
  color: #b30000;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
}

.brand-info {
  line-height: 1.2;
}

.brand-name {
  font-size: 13px;
  font-weight: 800;
  color: #0f172a;
}

.brand-subtitle {
  font-size: 11px;
  font-weight: 600;
  color: #64748b;
}

/* Info sistem */
.system-info {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 12px;
}

.info-item {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  font-weight: 600;
  color: #475569;
}

.status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
}

.status-dot.active {
  background: #22c55e;
}

/* Copyright */
.footer-copyright {
  font-size: 11px;
  color: #94a3b8;
  text-align: center;
  margin-top: 10px;
}

/* =======================
   MOBILE REFINEMENT
======================= */
@media (max-width: 768px) {
  .sidebar-footer {
    padding: 16px;
  }

  .logo-text {
    font-size: 16px;
  }
}

/* Container utama profil */
#section-profil {
  padding-top: 12px;
}

/* Kartu profil */
.profile-container {
  /* max-width: 900px; */
  margin: 0 auto;
}

.profile-card {
  background: #ffffff;
  border-radius: 18px;
  padding: 28px 32px;
  box-shadow: 0 10px 28px rgba(15, 23, 42, 0.08);
}

/* Header profil */
.profile-header {
  display: flex;
  align-items: center;
  gap: 22px;
  padding-bottom: 22px;
  border-bottom: 1px solid #e5e7eb;
  margin-bottom: 26px;
}

.profile-avatar {
  width: 78px;
  height: 78px;
  border-radius: 50%;
  background: linear-gradient(135deg, #b30000, #ff4d4d);
  color: #ffffff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 32px;
}

.profile-header-content h2 {
  font-size: 22px;
  font-weight: 800;
  margin: 0;
}

.profile-header-content p {
  margin-top: 4px;
  color: #64748b;
  font-weight: 600;
}

/* Grid detail */
.profile-details {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 18px;
}

/* Item detail */
.detail-item {
  background: #f9fafb;
  border-radius: 14px;
  padding: 16px 18px;
  display: flex;
  flex-direction: column;
}

.detail-item label {
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  color: #94a3b8;
  margin-bottom: 6px;
}

.detail-item span {
  font-size: 15px;
  font-weight: 700;
  color: #0f172a;
}

/* Status badge */
.status-indicator {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-weight: 700;
  font-size: 14px;
}

.status-active {
  color: #16a34a;
}

/* Mobile refinement */
@media (max-width: 640px) {
  .profile-card {
    padding: 22px;
  }

  .profile-header {
    flex-direction: column;
    align-items: flex-start;
  }

  .profile-avatar {
    width: 64px;
    height: 64px;
    font-size: 26px;
  }
}

/* ======================================================
   FIX TOTAL TAMPILAN LAPORAN
====================================================== */

#section-laporan {
  padding-top: 12px;
}

/* Container laporan */
.reports-container {
  /* max-width: 1100px; */
  margin: 0 auto;
}

/* Card utama */
.report-history-card {
  background: #ffffff;
  border-radius: 18px;
  padding: 26px 28px;
  box-shadow: 0 10px 28px rgba(15, 23, 42, 0.08);
}

/* Header laporan */
.laporan-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
  padding-bottom: 14px;
  border-bottom: 1px solid #e5e7eb;
}

.laporan-title h4 {
  font-size: 18px;
  font-weight: 800;
  margin: 0;
}

.btn-refresh {
  background: #f1f5f9;
  border: none;
  padding: 5px 10px;
  border-radius: 10px;
  font-weight: 400;
  cursor: pointer;
  transition: all 0.2s ease;
}

.btn-refresh:hover {
  background: #e5e7eb;
}

.tn-action {
  display: flex;
  gap: 8px;
}

.btn-action {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 14px;
  font-size: 13px;
  font-weight: 500;
  border-radius: 10px;
  cursor: pointer;
  border: none;
  transition: all 0.2s ease;
  white-space: nowrap;
}

  background: #f1f5f9;

}

.btn-secondary:hover {

}

.btn-secondary i {

} */

/* Primary - Upload */
.btn-primary {
  background: linear-gradient(135deg, #dc2626, #b91c1c);
  color: #ffffff;
  box-shadow: 0 4px 10px rgba(220, 38, 38, 0.25);
}

.btn-primary:hover {
  background: linear-gradient(135deg, #b91c1c, #991b1b);
  transform: translateY(-1px);
}

.btn-primary:active {
  transform: translateY(0);
}

/* Disabled state */
.btn-action:disabled {
  opacity: 0.6;
  cursor: not-allowed;
  box-shadow: none;
}


/* Wrapper tabel */
.table-wrapper {
  overflow-x: auto;
}

/* Tabel laporan */
.laporan-table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
}

.laporan-table thead {
  background: #f9fafb;
}

.laporan-table th {
  padding: 14px;
  font-size: 13px;
  font-weight: 700;
  color: #64748b;
  text-align: left;
  border-bottom: 1px solid #e5e7eb;
}

.laporan-table td {
  padding: 16px 14px;
  font-size: 14px;
  border-bottom: 1px solid #e5e7eb;
  vertical-align: middle;
}

.laporan-table tbody tr:hover {
  background: #fafafa;
}

/* File cell */
.file-info {
  display: flex;
  align-items: center;
  gap: 14px;
}

.file-icon {
  width: 42px;
  height: 42px;
  border-radius: 10px;
  background: #fee2e2;
  color: #b30000;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
}

.file-name {
  font-weight: 700;
}

.file-path {
  font-size: 12px;
  color: #94a3b8;
  margin-top: 2px;
}

/* Badge periode */
.period-badge {
  padding: 6px 12px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 700;
  color: #ffffff;
}

/* Aksi */
.action-cell .action-buttons {
  display: flex;
  gap: 10px;
}

.btn-download:hover {
  background: #dcfce7;
  color: #166534;
}

/* Empty state */
#riwayatLaporan .empty-state {
  padding: 48px 24px;
  text-align: center;
  color: #64748b;

/* ================================
   MODAL PENGAJUAN LHK
================================ */

/* Overlay */
#modalCetakAgenda {
  position: fixed;
  inset: 0;
  background: rgba(15, 23, 42, 0.55);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  animation: fadeIn 0.25s ease;
}

/* Container */
#modalCetakAgenda .modal-content {
  background: #ffffff;
  width: 100%;
  max-width: 480px;
  border-radius: 16px;
  box-shadow: 0 24px 60px rgba(0, 0, 0, 0.18);
  overflow: hidden;
  animation: scaleIn 0.25s ease;
  font-family: inherit;
}

/* Header */
#modalCetakAgenda .modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid #eef0f3;
}

#modalCetakAgenda .modal-header h3 {
  margin: 0;
  font-size: 17px;
  font-weight: 600;
  color: #111827;
}

#modalCetakAgenda .modal-header h3 i {
  margin-right: 8px;
  color: #2563eb;
}

#modalCetakAgenda .modal-header button {
  background: transparent;
  border: none;
  font-size: 22px;
  cursor: pointer;
  color: #6b7280;
  transition: color 0.2s ease;
}

#modalCetakAgenda .modal-header button:hover {
  color: #111827;
}

/* Body */
#modalCetakAgenda .modal-body {
  padding: 0px;
}

#modalCetakAgenda .form-group {
  margin-bottom: 18px;
}

#modalCetakAgenda .form-group label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 6px;
  color: #374151;
}

#modalCetakAgenda .form-control {
  width: 100%;
  padding: 10px 12px;
  border-radius: 10px;
  border: 1px solid #d1d5db;
  font-size: 13px;
  outline: none;
  transition: all 0.2s ease;
  background: #fff;
}

#modalCetakAgenda .form-control:hover {
  border-color: #9ca3af;
}

#modalCetakAgenda .form-control:focus {
  border-color: #dc2626;
  box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.15);
}

#modalCetakAgenda .text-muted {
  display: block;
  margin-top: 6px;
  font-size: 12px;
  color: #6b7280;
  line-height: 1.4;
}

/* Footer */
#modalCetakAgenda .modal-footer {
  display: flex;
  justify-content: flex-end;
  gap: 10px;
  padding: 16px 22px;
  border-top: 1px solid #eef0f3;
  background: #fafafa;
}

/* Tombol umum */
#modalCetakAgenda .modal-footer button {
  padding: 9px 16px;
  font-size: 13px;
  border-radius: 10px;
  cursor: pointer;
  border: none;
  font-weight: 600;
  transition: all 0.2s ease;
}

/* Tombol batal */
#modalCetakAgenda .modal-footer button:first-child {
  background: #e5e7eb;
  color: #374151;
}

#modalCetakAgenda .modal-footer button:first-child:hover {
  background: #d1d5db;
}

/* Tombol preview */
#modalCetakAgenda .btn-preview {
  background: #eef2ff;
  color: #3730a3;
  border: 1px solid #c7d2fe;
}

#modalCetakAgenda .btn-preview:hover {
  background: #e0e7ff;
}

/* Tombol ajukan */
#modalCetakAgenda #btnCetakAgenda {
  background: #dc2626;
  color: #ffffff;
  box-shadow: 0 6px 18px rgba(220, 38, 38, 0.25);
}

#modalCetakAgenda #btnCetakAgenda:hover {
  background: #b91c1c;
  transform: translateY(-1px);
}

#modalCetakAgenda #btnCetakAgenda:disabled {
  opacity: 0.6;
  cursor: not-allowed;
  transform: none;
  box-shadow: none;
}

/* Animasi */
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

@keyframes scaleIn {
  from {
    transform: scale(0.96);
    opacity: 0;
  }
  to {
    transform: scale(1);
    opacity: 1;
  }
}
