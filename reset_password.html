<!DOCTYPE html>
<html lang="id">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password | E-Office KPU</title>

  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #f8fafc;
      margin: 0;
      padding: 0;
    }

    .container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .card {
      background: #ffffff;
      width: 100%;
      max-width: 380px;
      padding: 32px 30px;
      border-radius: 16px;
      box-shadow: 0 12px 28px rgba(0,0,0,.08);
      position: relative;
    }

    h3 {
      margin: 0 0 6px;
      text-align: center;
      font-size: 20px;
      font-weight: 700;
      color: #111827;
    }

    p {
      font-size: 13px;
      color: #64748b;
      text-align: center;
      margin-bottom: 22px;
    }

    /* ===== MESSAGE ===== */
    .message {
      display: none;
      margin-bottom: 14px;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 13px;
    }

    .message.error {
      background: #fee2e2;
      color: #991b1b;
    }

    .message.success {
      background: #dcfce7;
      color: #166534;
    }

    .message.info {
      background: #e0f2fe;
      color: #075985;
    }

    /* ===== INPUT ===== */
    .input-group {
      position: relative;
      margin-bottom: 14px;
    }

    .input-group input {
      width: 100%;
      height: 46px;
      padding: 0 70px 0 14px;
      border-radius: 10px;
      border: 1px solid #cbd5e1;
      font-size: 14px;
      box-sizing: border-box;
      background: #fff;
    }

    .input-group input::placeholder {
      color: #9ca3af;
    }

    .input-group input:focus {
      outline: none;
      border-color: #b30000;
      box-shadow: none;
    }

    .toggle-eye {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 12px;
      font-weight: 600;
      color: #64748b;
      cursor: pointer;
      user-select: none;
    }

    .toggle-eye:hover {
      color: #b30000;
    }

    /* ===== BUTTON ===== */
    button {
      width: 100%;
      height: 46px;
      margin-top: 18px;
      border: none;
      border-radius: 10px;
      background: #b30000;
      color: #fff;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
    }

    button:hover {
      background: #990000;
    }

    button:disabled {
      background: #d1d5db;
      cursor: not-allowed;
    }

    button.secondary {
      margin-top: 12px;
      background: #ffffff;
      color: #b30000;
      border: 1px solid #b30000;
      display: none;
    }

    button.secondary:hover {
      background: #fff5f5;
    }

    .footer {
      margin-top: 18px;
      text-align: center;
      font-size: 11px;
      color: #9ca3af;
    }

    /* ===== LOADING ===== */
    .loading-overlay {
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,.85);
      border-radius: 16px;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 10;
      font-size: 13px;
      color: #374151;
    }
  </style>
</head>

<body>
<div class="container">
  <div class="card">
    <h3>Reset Password</h3>
    <p>Masukkan password baru untuk akun Anda</p>

    <div id="message" class="message"></div>

    <div class="input-group">
      <input type="password" id="newPass" placeholder="Password baru (min. 6 karakter)">
      <span class="toggle-eye" onclick="togglePassword('newPass', this)">Lihat</span>
    </div>

    <div class="input-group">
      <input type="password" id="confirmPass" placeholder="Ulangi password baru">
      <span class="toggle-eye" onclick="togglePassword('confirmPass', this)">Lihat</span>
    </div>

    <button id="btnReset" onclick="submitReset()">Simpan Password</button>

    <button id="btnLogin" class="secondary" onclick="goToLogin()">
      Login ke Sistem
    </button>

    <div class="footer">
      © KPU Kabupaten Siak
    </div>

    <div class="loading-overlay" id="loading">
      Memproses…
    </div>
  </div>
</div>

<script>
  let token = null;
  const LOGIN_URL = 'https://tinyurl.com/lhk-kpusiak';

  google.script.url.getLocation(loc => {
    token = loc.parameter.token || null;
    if (!token) {
      showMessage('error', 'Token reset tidak ditemukan atau link tidak valid.');
      document.getElementById('btnReset').disabled = true;
    }
  });

  function showMessage(type, text) {
    const msg = document.getElementById('message');
    msg.className = 'message ' + type;
    msg.textContent = text;
    msg.style.display = 'block';
  }

  function setLoading(state) {
    document.getElementById('loading').style.display = state ? 'flex' : 'none';
    document.getElementById('btnReset').disabled = state;
  }

  function submitReset() {
    const pass = document.getElementById('newPass').value;
    const confirm = document.getElementById('confirmPass').value;

    if (!token) {
      showMessage('error', 'Token reset tidak valid.');
      return;
    }

    if (!pass || pass.length < 6) {
      showMessage('error', 'Password minimal 6 karakter.');
      return;
    }

    if (pass !== confirm) {
      showMessage('error', 'Konfirmasi password tidak sama.');
      return;
    }

    showMessage('info', 'Memproses perubahan password…');
    setLoading(true);

    google.script.run
      .withSuccessHandler(res => {
        setLoading(false);

        if (!res.success) {
          showMessage('error', res.message);
          return;
        }

        showMessage('success', 'Password berhasil diubah. Silakan login kembali.');

        document.getElementById('btnReset').style.display = 'none';
        document.getElementById('newPass').disabled = true;
        document.getElementById('confirmPass').disabled = true;
        document.getElementById('btnLogin').style.display = 'block';
      })
      .withFailureHandler(() => {
        setLoading(false);
        showMessage('error', 'Terjadi kesalahan. Silakan coba kembali.');
      })
      .resetPassword(token, pass);
  }

  function togglePassword(id, el) {
    const input = document.getElementById(id);
    if (input.type === 'password') {
      input.type = 'text';
      el.textContent = 'Sembunyi';
    } else {
      input.type = 'password';
      el.textContent = 'Lihat';
    }
  }

  function goToLogin() {
    window.open(LOGIN_URL, '_blank');
  }
</script>
</body>
</html>
