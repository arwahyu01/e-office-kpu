<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">

  <style>

    @page{
      size:A4 portrait;
      margin:22px;
    }

    *{
      box-sizing:border-box;
    }

    body{
      font-family:Arial,sans-serif;
      color:#111827;
      font-size:10px;
      margin:0;
      padding:0;
    }

    /* =========================
       HEADER
    ========================== */

    .header{
      margin-bottom:16px;
    }

    .title{
      text-align:center;
      font-size:20px;
      font-weight:700;
      letter-spacing:.5px;
      margin-bottom:2px;
    }

    .subtitle{
      text-align:center;
      font-size:13px;
      font-weight:700;
      margin-bottom:2px;
    }

    .periode{
      text-align:center;
      font-size:11px;
      color:#4b5563;
    }

    .line{
      border-top:1.5px solid #9ca3af;
      margin-top:12px;
    }

    /* =========================
       IDENTITAS
    ========================== */

    .identitas-wrapper{
      margin-top:14px;
      margin-bottom:14px;
    }

    .identitas{
      width:100%;
      border-collapse:collapse;
    }

    .identitas td{
      padding:2px 0;
      font-size:11px;
      vertical-align:top;
    }

    .identitas .label{
      width:90px;
      color:#374151;
      font-weight:600;
    }

    .identitas .separator{
      width:10px;
    }

    /* =========================
       TABLE
    ========================== */

    .table{
      width:100%;
      border-collapse:collapse;
      table-layout:fixed;
      text-align:center;
    }

    .table thead{
      display:table-header-group;
    }

    .table tr{
      page-break-inside:avoid;
    }

    .table th{
      background:#f3f4f6;
      color:#111827;
      font-size:10px;
      font-weight:700;
      padding:8px 6px;
      border-top:1px solid #d1d5db;
      border-bottom:2px solid #9ca3af;
      text-align:center;
    }

    .table td{
      padding:6px 6px;
      border-bottom:1px solid #e5e7eb;
      font-size:10px;
      color:#111827;
      vertical-align:middle;
    }

    .table tbody tr:nth-child(even){
      background:#fafafa;
    }

    .center{
      text-align:center;
    }

    /* =========================
       COLUMN WIDTH
    ========================== */

    .col-no{
      width:42px;
    }

    .col-tanggal{
      width:110px;
    }

    .col-jam{
      width:90px;
    }

    .col-total{
      width:90px;
    }

    .col-status{
      width:150px;
    }

    /* =========================
       BADGE STATUS
    ========================== */

    .badge{
      display:inline-block;
      padding:3px 8px;
      border-radius:999px;
      font-size:9px;
      font-weight:700;
      line-height:1.2;
    }

    .badge-hadir{
      background:#dcfce7;
      color:#166534;
    }

    .badge-izin{
      background:#fef3c7;
      color:#92400e;
    }

    .badge-alpha{
      background:#fee2e2;
      color:#991b1b;
    }

    .badge-tidaklengkap{
      background:#dbeafe;
      color:#1d4ed8;
    }

    /* =========================
       SIGNATURE
    ========================== */

    .signature{
      width:260px;
      margin-left:auto;
      margin-top:40px;
      text-align:center;
      page-break-inside:avoid;
    }

    .signature-title{
      font-size:11px;
      margin-bottom:2px;
    }

    .signature-space{
      height:65px;
    }

    .signature-name{
      font-size:11px;
      font-weight:700;
      text-decoration:underline;
      margin-bottom:2px;
    }

    .signature-nip{
      font-size:10px;
    }

  </style>
</head>

<body>

  <!-- =========================
       HEADER
  ========================== -->

  <div class="header">

    <div class="title">
      REKAP ABSENSI
    </div>

    <div class="subtitle">
      KPU KABUPATEN SIAK
    </div>

    <div class="periode">
      Periode <?= periodeLabel ?>
    </div>

    <div class="line"></div>

  </div>

  <!-- =========================
       IDENTITAS
  ========================== -->

  <div class="identitas-wrapper">

    <table class="identitas">

      <tr>
        <td class="label">Nama</td>
        <td class="separator">:</td>
        <td><?= pegawai.nama || '-' ?></td>
      </tr>

      <tr>
        <td class="label">NIP</td>
        <td class="separator">:</td>
        <td><?= pegawai.nip || '-' ?></td>
      </tr>

      <tr>
        <td class="label">Jabatan</td>
        <td class="separator">:</td>
        <td><?= pegawai.jabatan || '-' ?></td>
      </tr>

      <tr>
        <td class="label">Unit Kerja</td>
        <td class="separator">:</td>
        <td>
          <?= pegawai.subbag || (pegawai.jabatan == 'Sekretaris'
            ? 'Sekretariat KPU Kabupaten Siak'
            : '-') ?>
        </td>
      </tr>

    </table>

  </div>


  <!-- =========================
       TABLE
  ========================== -->

  <table class="table">

    <thead>
      <tr>

        <th class="col-no center">
          No
        </th>

        <th class="col-tanggal">
          Tanggal
        </th>

        <th class="col-jam center">
          Jam Masuk
        </th>

        <th class="col-jam center">
          Jam Pulang
        </th>

        <th class="col-total center">
          Total Jam
        </th>
        <th class="col-status">
          Keterangan
        </th>

      </tr>
    </thead>

    <tbody>

      <? for(var i=0;i<rows.length;i++){ ?>

        <?

          var badgeClass = 'badge-hadir';

          if(
            rows[i].keterangan === 'Tidak Hadir'
          ){
            badgeClass = 'badge-alpha';
          }

          else if(
            rows[i].keterangan === 'Tidak Lengkap'
          ){
            badgeClass = 'badge-tidaklengkap';
          }

          else if(
            rows[i].keterangan === 'Izin' ||
            rows[i].keterangan === 'Sakit' ||
            rows[i].keterangan === 'Cuti' ||
            rows[i].keterangan === 'Dinas Luar'
          ){
            badgeClass = 'badge-izin';
          }

        ?>

        <tr>

          <td class="center">
            <?= rows[i].no ?>
          </td>

          <td>
            <?= rows[i].tanggal ?>
          </td>

          <td class="center">
            <?= rows[i].masuk ?>
          </td>

          <td class="center">
            <?= rows[i].pulang ?>
          </td>

          <td class="center">
            <?= rows[i].totalJamKerja ?>
          </td>

          <td>
            <span class="badge <?= badgeClass ?>">
              <?= rows[i].keterangan ?>
            </span>
          </td>

        </tr>

      <? } ?>

    </tbody>

  </table>

  <!-- =========================
       SIGNATURE
  ========================== -->

  <div class="signature">

    <div class="signature-title">
      Mengetahui,
    </div>

    <div class="signature-title">
      Sekretaris KPU Kabupaten Siak
    </div>

    <div class="signature-space"></div>

    <div class="signature-name">
      OKTAVIYANUS
    </div>

    <div class="signature-nip">
      NIP. 198010102009021004
    </div>

  </div>

</body>
</html>
